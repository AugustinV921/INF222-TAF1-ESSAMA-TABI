<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Blog INF222 - Version Finale</title>
    <!-- On utilise Tailwind CSS pour le design professionnel -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Animation pour faire apparaître les articles en douceur */
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans">

    <!-- HEADER COLORE -->
    <header class="bg-gradient-to-r from-blue-700 via-indigo-600 to-purple-700 text-white shadow-lg p-6 mb-8">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight">PROJET INF222 : BACKEND BLOG</h1>
                <p class="text-blue-100 opacity-80 text-sm mt-1">Géré avec Node.js & SQLite</p>
            </div>
            <!-- BARRE DE RECHERCHE ORANGE -->
            <div class="relative hidden md:block">
                <input id="search" onkeyup="rechercher()" type="text" placeholder="Rechercher par mot-clé..." 
                    class="pl-10 pr-4 py-2 rounded-full border-none text-slate-800 bg-orange-50 focus:ring-4 focus:ring-orange-300 outline-none w-64 transition-all">
                <span class="absolute left-3 top-2 text-orange-500 font-bold">🔍</span>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 grid grid-cols-1 lg:grid-cols-12 gap-8 pb-10">
        
        <!-- SECTION GAUCHE : FORMULAIRE (VERT) -->
        <div class="lg:col-span-4">
            <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-emerald-100 sticky top-24">
                <div class="bg-emerald-500 p-4 text-white text-center font-bold text-lg">
                    ✨ PUBLIER UN NOUVEL ARTICLE
                </div>
                <div class="p-6 space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-emerald-600 mb-1">TITRE DE L'ARTICLE</label>
                        <input id="titre" type="text" placeholder="Ex: Apprendre Express" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:border-emerald-500 outline-none">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-emerald-600 mb-1">AUTEUR</label>
                            <input id="auteur" type="text" placeholder="Ton Nom" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:border-emerald-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-emerald-600 mb-1">CATÉGORIE</label>
                            <input id="categorie" type="text" placeholder="Tech / Vie" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:border-emerald-500 outline-none">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-emerald-600 mb-1">CONTENU DU POST</label>
                        <textarea id="contenu" rows="4" placeholder="Écrivez ici..." class="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:border-emerald-500 outline-none"></textarea>
                    </div>
                    <button onclick="ajouter()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-black py-4 rounded-xl shadow-lg shadow-emerald-200 transition-all active:scale-95">
                        ✅ ENREGISTRER L'ARTICLE
                    </button>
                </div>
            </div>
        </div>

        <!-- SECTION DROITE : LISTE (BLEU/GRIS) -->
        <div class="lg:col-span-8">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black text-slate-800 uppercase tracking-tighter">Flux des publications</h2>
                <div id="count" class="bg-blue-600 text-white px-4 py-1 rounded-full text-xs font-bold">0 ARTICLES</div>
            </div>

            <div id="feed" class="space-y-6">
                <!-- Les articles s'afficheront ici -->
                <p class="text-center py-10 text-slate-400 font-bold italic">Chargement des données du serveur...</p>
            </div>
        </div>

    </main>

    <script>
        // L'URL de ton API (Backend)
        const API = "http://localhost:3000/api/articles";

        // FONCTION : CHARGER TOUS LES ARTICLES
        async function charger(url = API) {
            try {
                const reponse = await fetch(url);
                const articles = await reponse.json();
                
                // Mise à jour du compteur
                document.getElementById('count').innerText = articles.length + " ARTICLE(S)";
                
                const container = document.getElementById('feed');
                container.innerHTML = ""; // Vider la liste actuelle

                if(articles.length === 0) {
                    container.innerHTML = "<div class='bg-white p-10 rounded-2xl text-center shadow italic text-slate-400'>Aucun article à afficher.</div>";
                    return;
                }

                // Génération des articles
                articles.forEach(art => {
                    container.innerHTML += `
                        <div class="bg-white p-6 rounded-2xl shadow-md border-l-8 border-blue-500 fade-in flex justify-between items-start">
                            <div class="flex-1">
                                <div class="flex items-center gap-2 mb-2">
                                    <span class="bg-blue-100 text-blue-700 text-[10px] font-black px-2 py-0.5 rounded uppercase">
                                        ${art.categorie || 'Général'}
                                    </span>
                                    <span class="text-slate-300 text-xs">ID #${art.id}</span>
                                </div>
                                <h3 class="text-xl font-bold text-slate-900 mb-2">${art.titre}</h3>
                                <p class="text-slate-600 leading-relaxed mb-4">${art.contenu}</p>
                                <div class="flex items-center gap-4 text-xs font-bold text-slate-400 border-t pt-4">
                                    <span>👤 PAR : ${art.auteur}</span>
                                    <span>📅 LE : ${art.date}</span>
                                </div>
                            </div>
                            <button onclick="supprimer(${art.id})" class="ml-4 p-2 bg-red-50 text-red-500 rounded-lg hover:bg-red-500 hover:text-white transition-all shadow-sm">
                                🗑️ Supprimer
                            </button>
                        </div>
                    `;
                });
            } catch (err) {
                console.error("Erreur Backend :", err);
            }
        }
